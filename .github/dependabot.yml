version: 2
updates:
  # Rust dependencies — one grouped PR/week keeps the noise down.
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      cargo:
        patterns: ["*"]

  # GitHub Actions — low churn, keeps runners current (e.g. the Node 20 notice).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions:
        patterns: ["*"]
