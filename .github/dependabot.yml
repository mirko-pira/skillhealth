version: 2
updates:
  # Rust dependencies — one grouped PR/week keeps the noise down.
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      cargo:
        patterns: ["*"]

  # GitHub Actions — low churn, keeps runners current (e.g. the Node 20 notice).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions:
        patterns: ["*"]
    ignore:
      # `@1.88` on dtolnay/rust-toolchain is our Rust MSRV, NOT an action version.
      # Dependabot misreads it and "bumps" to a non-existent Rust (e.g. 1.100),
      # silently breaking the msrv gate. Bump the MSRV by hand when warranted.
      - dependency-name: "dtolnay/rust-toolchain"
